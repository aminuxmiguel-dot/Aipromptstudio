kind = "web"
previewPath = "/"
title = "AI Prompt Studio"
version = "1.0.0"
id = "artifacts/ai-prompt-studio"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20676

[services.development]
run = "pnpm --filter @workspace/ai-prompt-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-prompt-studio", "run", "build" ]
serve = "static"
publicDir = "artifacts/ai-prompt-studio/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20676"
BASE_PATH = "/"
